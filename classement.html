<h1>Classement général</h1>

<div class="annee-container">
    <label for="anneeSelect">Année :</label>
    <select id="anneeSelect"></select>
</div>

<!-- TABLEAU DU CLASSEMENT -->
<div class="form-container">
    <h2>Classement final</h2>

    <!-- 🔥 Bouton d'export PDF -->
    <button class="btn" onclick="exporterPDF()">Exporter PDF</button>

    <table style="width:100%; border-collapse:collapse; text-align:center; margin-top:20px;">
        <thead>
            <tr>
                <th>Rang</th>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Moyenne</th>
            </tr>
        </thead>

        <!-- IMPORTANT : ID EXACTEMENT COMME DANS app.js -->
        <tbody id="classementBody"></tbody>
    </table>
</div>

<!-- 🔥 jsPDF + AutoTable (obligatoire pour PDF) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
