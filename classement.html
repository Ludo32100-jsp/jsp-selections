<h1>Classement général</h1>

<!-- TABLEAU DU CLASSEMENT -->
<div class="form-container">
    <h2>Classement final</h2>

    <table style="width:100%; border-collapse:collapse; text-align:center;">
        <thead>
            <tr>
                <th>Rang</th>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Moyenne</th>
            </tr>
