<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accueil - Sélections JSP</title>

    <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <button class="hamburger" onclick="toggleMenu()">☰</button>

    <div id="mobileMenu" class="mobile-menu">
        <a href="index.html">Accueil</a>
        <a href="candidats.html">Candidats</a>
        <a href="resultats.html">Résultats</a>
        <a href="classement.html">Classement</a>
    </div>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="candidats.html">Candidats</a>
        <a href="resultats.html">Résultats</a>
        <a href="classement.html">Classement</a>
    </nav>
</header>

<h1>Application Sélections JSP</h1>

<div class="annee-container">
    <label for="anneeSelect">Année :</label>
    <select id="anneeSelect"></select>
</div>

<div class="home-buttons">
    <button class="btn" onclick="location.href='candidats.html'">Candidats</button>
    <button class="btn" onclick="location.href='resultats.html'">Résultats</button>
    <button class="btn" onclick="location.href='classement.html'">Classement</button>
</div>

<!-- 🔥 Le script DOIT être ici pour fonctionner sur mobile -->
<script>
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.classList.toggle("show");
}
</script>

<script type="module" src="app.js"></script>

<!-- 🔥 Bandeau de mise à jour -->
<div id="updateBanner" class="update-banner" style="display:none;">
    Nouvelle version disponible —
    <button onclick="updateApp()">Mettre à jour</button>
</div>

<!-- 🔥 Service Worker + détection de mise à jour -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");

  navigator.serviceWorker.addEventListener("controllerchange", () => {
    // Affiche le bandeau au lieu de recharger direct
    document.getElementById("updateBanner").style.display = "block";
  });
}

function updateApp() {
  window.location.reload();
}
</script>

</body>
</html>
