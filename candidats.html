<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Candidats JSP</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<header class="topbar">

    <div id="mobileMenu" class="mobile-menu">

    <button class="btn-dark" onclick="toggleDarkMode()">🌙 Mode sombre</button>
</header>

<h1 style="text-align:center; margin-top:20px;">Gestion des candidats</h1>

<main class="bloc-formulaire">

    <label>Prénom :</label>
    <input id="prenom" type="text">

    <label>Nom :</label>
    <input id="nom" type="text">

    <label>Date de naissance :</label>
    <input id="dateNaissance" type="date">

    <label>Sexe :</label>
    <select id="sexe">
        <option value="">-- Choisir --</option>
        <option value="M">Masculin</option>
        <option value="F">Féminin</option>
    </select>

    <label>Adresse :</label>
    <input id="adresse" type="text">

    <label>Code Postal :</label>
    <input id="codePostal" type="text">

    <label>Ville :</label>
    <input id="ville" type="text">

    <label>Téléphone :</label>
    <input id="telephone" type="text">

    <label>Mail :</label>
    <input id="mail" type="email">

    <button class="btn" onclick="ajouterCandidat()">Ajouter le candidat</button>

</main>

<h2 style="text-align:center;">Liste des candidats</h2>
<div id="liste-candidats" class="bloc-resultats"></div>

<script src="app.js"></script>

document.addEventListener("DOMContentLoaded", () => {
