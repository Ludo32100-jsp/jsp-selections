<h1>Liste des candidats</h1>

<div class="annee-container">
    <label for="anneeSelect">Année :</label>
    <select id="anneeSelect"></select>
</div>

<div class="form-container">
    <h2>Ajouter un candidat</h2>

    <label>Prénom</label>
    <input type="text" id="prenom">

    <label>Nom</label>
    <input type="text" id="nom">

    <label>Date de naissance</label>
    <input type="date" id="dateNaissance">

    <label>Sexe</label>
    <select id="sexe">
        <option value="M">Masculin</option>
        <option value="F">Féminin</option>
    </select>

    <label>Adresse</label>
    <input type="text" id="adresse">

    <label>Code postal</label>
    <input type="text" id="codePostal">

    <label>Ville</label>
    <input type="text" id="ville">

    <label>Téléphone</label>
    <input type="text" id="telephone">

    <label>Mail</label>
    <input type="email" id="mail">

    <button class="btn" onclick="ajouterCandidat()">Ajouter</button>
</div>

<h2>Candidats enregistrés</h2>

<!-- IMPORTANT : ID EXACTEMENT COMME DANS app.js -->
<div id="liste-candidats"></div>

<!-- IMPORTANT : type="module" obligatoire -->
<script type="module" src="app.js"></script>
