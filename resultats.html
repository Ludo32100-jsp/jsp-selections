<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Résultats - Sélections JSP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <button class="hamburger" onclick="toggleMenu()">☰</button>

    <div id="mobileMenu" class="mobile-menu">
        <a href="index.html">Accueil</a>
        <a href="candidats.html">Candidats</a>
        <a href="resultats.html">Résultats</a>
        <a href="classement.html">Classement</a>
    </div>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="candidats.html">Candidats</a>
        <a href="resultats.html">Résultats</a>
        <a href="classement.html">Classement</a>
    </nav>
</header>

<h1>Résultats des épreuves</h1>

<div class="annee-container">
    <label for="anneeSelect">Année :</label>
    <select id="anneeSelect">
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
    </select>
</div>

<div class="form-container">
    <h2>Enregistrer un résultat</h2>

    <!-- Sélection du candidat -->
    <label for="candidatSelect">Candidat :</label>
    <select id="candidatSelect"></select>

    <!-- Sélection de l'épreuve -->
    <label for="epreuveSelect">Épreuve :</label>
    <select id="epreuveSelect">
        <option value="Luc Léger">Luc Léger</option>
        <option value="Tractions">Tractions</option>
        <option value="Pompes">Pompes</option>
        <option value="Souplesse">Souplesse</option>
        <option value="Gainage">Gainage</option>
        <option value="Squats">Squats</option>
        <option value="Écrit">Écrit</option>
        <option value="Oral">Oral</option>
    </select>

    <!-- Valeur de l'épreuve (par défaut) -->
    <label for="valeurEpreuve">Valeur :</label>
    <input type="number" id="valeurEpreuve">

    <!-- Valeurs spécifiques pour Gainage -->
    <div id="gainageInputs" style="display:none; margin-top:15px;">
        <label>Minutes :</label>
        <input type="number" id="gainageMin" min="0" max="10">

        <label>Secondes :</label>
        <input type="number" id="gainageSec" min="0" max="59">
    </div>

    <button class="btn" onclick="enregistrerResultat()">Enregistrer</button>
</div>

<h2>Résultats du candidat</h2>
<div id="resultats-epreuves"></div>

<script>
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.classList.toggle("show");
}
</script>

<!-- IMPORTANT : module obligatoire -->
<script type="module" src="app.js"></script>

</body>
</html>
